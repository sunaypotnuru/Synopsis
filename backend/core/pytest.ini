[pytest]
# Pytest configuration for Netra AI Backend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers

# Warning filters - suppress external library warnings we cannot control
filterwarnings =
    # Ignore eventlet deprecation from sentry_sdk (external library)
    ignore::DeprecationWarning:sentry_sdk
    
    # Ignore Python version end-of-life warning from google.api_core (informational only)
    ignore::FutureWarning:google.api_core
    
    # Ignore load_module deprecation from Python's importlib (internal to Python)
    ignore::DeprecationWarning:importlib
    
    # Our code warnings are already fixed - these are just external dependencies
    # google.generativeai deprecation is suppressed in ai_service.py with warnings.catch_warnings()
    # SQLAlchemy declarative_base is now using sqlalchemy.orm.declarative_base()

# Markers for test categorization
markers =
    integration: Integration tests requiring external services (anemia-service, Supabase)
    unit: Unit tests that run in isolation
    slow: Tests that take more than 1 second
