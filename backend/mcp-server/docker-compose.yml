# ============================================================================
# Docker Compose - Prometheus + Grafana (FREE Monitoring Stack)
# ============================================================================
# Deploy on: Oracle Cloud Free Tier (2 CPUs, 1 GB RAM, FREE FOREVER)
# Cost: $0/month
# ============================================================================

version: '3.8'

services:
  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: netra-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'  # Keep 30 days of data
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - monitoring

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: netra-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      # Admin credentials
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      
      # Disable sign-up
      - GF_USERS_ALLOW_SIGN_UP=false
      
      # Anonymous access (read-only dashboards)
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      
      # SMTP (for email alerts - optional)
      - GF_SMTP_ENABLED=${SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${SMTP_HOST:-smtp.gmail.com:587}
      - GF_SMTP_USER=${SMTP_USER:-}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - GF_SMTP_FROM_ADDRESS=${SMTP_FROM:-alerts@netra-ai.com}
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - prometheus

  # Alertmanager (Alert Routing - Optional)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: netra-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local

networks:
  monitoring:
    driver: bridge

# ============================================================================
# DEPLOYMENT INSTRUCTIONS
# ============================================================================
#
# 1. ORACLE CLOUD FREE TIER SETUP:
#    - Sign up: https://www.oracle.com/cloud/free/
#    - Create VM: 2 AMD CPUs, 1 GB RAM, 50 GB storage
#    - OS: Ubuntu 22.04 LTS
#    - Open ports: 9090 (Prometheus), 3000 (Grafana), 9093 (Alertmanager)
#
# 2. INSTALL DOCKER:
#    sudo apt update
#    sudo apt install -y docker.io docker-compose
#    sudo systemctl enable docker
#    sudo systemctl start docker
#
# 3. DEPLOY STACK:
#    cd /opt/netra-ai
#    docker-compose up -d
#
# 4. ACCESS DASHBOARDS:
#    - Prometheus: http://<oracle-vm-ip>:9090
#    - Grafana: http://<oracle-vm-ip>:3000
#    - Default login: admin / admin (change immediately!)
#
# 5. CONFIGURE PROMETHEUS:
#    - Edit prometheus.yml
#    - Add Render MCP server as target
#    - Reload: docker-compose restart prometheus
#
# 6. IMPORT GRAFANA DASHBOARDS:
#    - Login to Grafana
#    - Go to Dashboards > Import
#    - Upload grafana/dashboards/netra-ai-dashboard.json
#
# 7. SET UP ALERTS:
#    - Edit grafana/provisioning/alerting/alerts.yml
#    - Configure notification channels (email, Slack)
#    - Reload: docker-compose restart grafana
#
# 8. MONITORING:
#    - Check container status: docker-compose ps
#    - View logs: docker-compose logs -f
#    - Restart: docker-compose restart
#
# 9. BACKUP:
#    - Prometheus data: /var/lib/docker/volumes/prometheus_data
#    - Grafana data: /var/lib/docker/volumes/grafana_data
#    - Backup weekly: tar -czf backup.tar.gz /var/lib/docker/volumes
#
# 10. SECURITY:
#     - Change Grafana admin password immediately
#     - Use firewall to restrict access
#     - Enable HTTPS with Let's Encrypt (optional)
#     - Use strong passwords for all services
#
# ============================================================================
